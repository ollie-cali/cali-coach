<!doctype html>
<!--
  CALI COACH — point your phone at an athlete, get live form scores.
  Handstand: alignment score + hold timer + cue. Push-up: rep counting + per-rep rating.
  Pose: MediaPipe Pose Landmarker (on-device, in-browser, no server, no video leaves the phone).
  Scoring: ./scorer.js — cross-verified against the Python reference (10/10 test vectors).
  AI coach: optional — paste an Anthropic API key in settings (stored ONLY in this
  browser's localStorage) and Claude writes the post-set coaching summary.
  Serve over https (GitHub Pages). iPhone Safari + Android Chrome supported.
-->
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cali Coach</title>
<link rel="manifest" href="./manifest.json"><meta name="theme-color" content="#0d1014">
<style>
  :root{--bg:#0d1014;--card:#161b22cc;--ink:#e9eef3;--sub:#9aa4ad;--gold:#e0a73a;--grn:#4cae6a;--red:#f0564b;--amber:#d29922}
  *{box-sizing:border-box;font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);overflow:hidden}
  #stage{position:fixed;inset:0}
  video{display:none}
  canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hud{position:absolute;left:0;right:0;display:flex;justify-content:center;pointer-events:none}
  #topbar{top:calc(env(safe-area-inset-top,0px) + 10px);gap:8px}
  .chip{background:var(--card);backdrop-filter:blur(8px);border:1px solid #2a313a;border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px}
  .chip.mode{color:var(--gold)}
  #scorewrap{bottom:calc(env(safe-area-inset-bottom,0px) + 86px);flex-direction:column;align-items:center;gap:4px}
  #score{font-size:88px;font-weight:800;line-height:1;color:var(--gold);text-shadow:0 2px 18px #000}
  #cue{font-size:18px;font-weight:700;background:var(--card);border-radius:12px;padding:8px 16px;backdrop-filter:blur(8px)}
  #sub{color:var(--sub);font-size:13px}
  #bottombar{bottom:calc(env(safe-area-inset-bottom,0px) + 14px);gap:10px;pointer-events:auto}
  button{background:var(--card);color:var(--ink);border:1px solid #2a313a;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:700;backdrop-filter:blur(8px)}
  button.gold{background:var(--gold);color:#1a1205;border:0}
  #panel{position:fixed;inset:auto 0 0 0;max-height:72%;background:#11161d;border-radius:18px 18px 0 0;border-top:1px solid #2a313a;
    padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 18px);overflow:auto;transform:translateY(105%);transition:transform .25s}
  #panel.open{transform:none}
  #panel h2{margin:0 0 10px;font-size:18px} .item{border-bottom:1px solid #222a33;padding:10px 0;font-size:14px}
  .item b{color:var(--gold)} textarea,input{width:100%;background:#0a0d11;color:var(--ink);border:1px solid #2a313a;border-radius:10px;padding:10px;font-size:14px}
  #coachout{white-space:pre-wrap;background:#0a0d11;border-radius:10px;padding:12px;font-size:14px;line-height:1.45;margin-top:8px}
  #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9}
  #splash h1{font-size:34px;margin:0}#splash h1 b{color:var(--gold)}
  #splash p{color:var(--sub);max-width:300px;text-align:center;margin:0;font-size:14px}
  .pulse{animation:p 1.4s infinite}@keyframes p{50%{opacity:.4}}
</style></head><body>
<div id="stage">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="hud" id="topbar">
    <span class="chip" id="recdot" hidden style="color:#f0564b">● REC</span>
  </div>
  <div class="hud" id="scorewrap"><div id="sub">auto-detects 9 moves: handstand · push-ups · squats · plank · pull-ups · front lever · L-sit · pike · bridge</div></div>
  <div class="hud" id="bottombar">
    <button id="flip">Flip</button><button id="voice">🔊</button><button class="gold" id="sessionbtn">Session</button><button id="historybtn">📈</button><button id="settings">⚙</button>
  </div>
</div>
<div id="panel">
  <h2 id="paneltitle">Session</h2>
  <div id="panelbody"></div>
  <div id="coachout" hidden></div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button class="gold" id="coachbtn" hidden>Ask the Cali coach</button><button id="closepanel">Close</button>
  </div>
</div>
<div id="splash"><h1>CALI <b>COACH</b></h1>
  <p>Live form scoring across 9 movements, strength to mobility. All on-device — no video leaves your phone.</p>
  <button class="gold" id="start">Start camera</button><p id="loadmsg" class="pulse">loading pose engine…</p>
</div>

<script type="module" src="./app.js"></script></body></html>
