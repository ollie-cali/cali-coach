<!doctype html>
<!-- ============================================================================
     CALIHOME — the handstand-board screen. Not a browser: a purpose-built Cali
     device face. Pairs ONCE to a phone running Cali Coach (⚙ > Mirror), saves the
     code, and auto-reconnects itself for good. The phone films + scores + casts;
     this shows it fullscreen. Runs locked in Fully Kiosk on the Tab A8 (SM-X205).
     Onyx/Bone/Amber/Gold — the Skill-Swirl palette.
============================================================================ -->
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CaliHome</title>
<style>
  :root{ --onyx:#1A1A1E; --bone:#ECE7DB; --amber:#F2B208; --gold:#C6A02C; --crimson:#D22F2A;
         --sub:#8b8778; }
  *{box-sizing:border-box;margin:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--onyx);color:var(--bone);
    font-family:"Helvetica Neue",Arial,system-ui,sans-serif;touch-action:none}
  #bg{position:fixed;inset:0;background:
    radial-gradient(120% 90% at 50% 42%, #23231b 0%, #1A1A1E 55%, #0e0e10 100%)}
  /* sonar rings behind the wordmark (cheap, CSS-only for the weak SoC) */
  .ring{position:fixed;top:42%;left:50%;width:180px;height:180px;margin:-90px 0 0 -90px;border-radius:50%;
    border:1.5px solid var(--gold);opacity:0;animation:sonar 4.2s ease-out infinite}
  .ring:nth-child(2){animation-delay:1.4s} .ring:nth-child(3){animation-delay:2.8s}
  @keyframes sonar{0%{transform:scale(.5);opacity:.55}70%{opacity:.06}100%{transform:scale(3.4);opacity:0}}
  @media (prefers-reduced-motion:reduce){.ring{animation:none}}

  #home{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;text-align:center;padding:6vh 4vw}
  .mark{font-weight:900;letter-spacing:.14em;font-size:clamp(44px,9vw,104px);line-height:.92}
  .mark b{color:var(--amber)}
  .tag{color:var(--sub);letter-spacing:.42em;font-size:clamp(11px,1.9vw,15px);text-transform:uppercase;font-weight:700}
  .status{margin-top:8px;color:var(--bone);font-size:clamp(15px,2.4vw,20px);min-height:1.4em;font-weight:500}
  .status .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--amber);margin-right:9px;vertical-align:middle;animation:blink 1.3s ease-in-out infinite}
  @keyframes blink{50%{opacity:.25}}
  .paired{position:fixed;bottom:22px;left:0;right:0;text-align:center;color:var(--sub);font-size:13px;letter-spacing:.18em;text-transform:uppercase}
  .paired b{color:var(--gold);letter-spacing:.28em}

  /* first-run pairing */
  #pair{display:none;flex-direction:column;align-items:center;gap:18px}
  #pair.show{display:flex}
  #pair p{color:var(--sub);max-width:440px;font-size:15px;line-height:1.5}
  #pair p b{color:var(--bone)}
  input{background:#121216;border:1.5px solid #34342c;color:var(--amber);border-radius:16px;padding:16px;
    font-size:40px;width:250px;text-align:center;letter-spacing:14px;text-transform:uppercase;font-weight:800;outline:none}
  input:focus{border-color:var(--amber)}
  button{background:var(--amber);color:#1a1205;border:0;border-radius:14px;padding:15px 34px;font-size:18px;font-weight:800;letter-spacing:.04em}
  button:active{transform:translateY(1px)}
  .msg{color:var(--crimson);font-size:14px;min-height:1.2em}

  /* live */
  video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:none}
  #live.on video{display:block}
  #bar{position:fixed;top:0;left:0;right:0;height:46px;display:none;align-items:center;justify-content:space-between;
    padding:0 18px;background:linear-gradient(#000a,transparent);pointer-events:none;transition:opacity .5s}
  #live.on #bar{display:flex}
  #bar .b-mark{font-weight:900;letter-spacing:.14em;font-size:16px}
  #bar .b-mark b{color:var(--amber)}
  #bar .b-live{color:var(--crimson);font-weight:800;letter-spacing:.12em;font-size:13px}
  #bar .b-live i{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--crimson);margin-right:7px;animation:blink 1.1s infinite}

  /* re-pair tap target (invisible, top-right) */
  #repair{position:fixed;top:0;right:0;width:74px;height:74px;z-index:20}
</style></head><body>
<div id="bg"></div>
<div class="ring"></div><div class="ring"></div><div class="ring"></div>

<div id="home">
  <div>
    <div class="mark">CALI<b>HOME</b></div>
    <div class="tag">Handstand Mirror</div>
  </div>
  <div class="status" id="status"><span class="dot"></span>starting…</div>

  <div id="pair">
    <p>On your phone open <b>Cali Coach</b> → ⚙ → <b>Mirror to a screen</b> → <b>Get mirror code</b>, then type it here once. I will remember it.</p>
    <input id="code" maxlength="4" placeholder="CODE" autocapitalize="characters" autocomplete="off" inputmode="text">
    <button id="go">Pair</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<div class="paired" id="paired"></div>

<div id="live">
  <video id="v" playsinline autoplay muted></video>
  <div id="bar"><span class="b-mark">CALI<b>HOME</b></span><span class="b-live"><i></i>LIVE</span></div>
</div>
<div id="repair" title="re-pair"></div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const KEY = "caliHomeCode";
let peer = null, code = localStorage.getItem(KEY), live = false, retryT = null, pairedConn = null;

function setStatus(t, blink=true){ $("status").innerHTML = (blink?'<span class="dot"></span>':'') + t; }
function showPair(show){ $("pair").classList.toggle("show", show); $("status").style.display = show ? "none" : ""; }
function footer(){ $("paired").innerHTML = code ? `paired · <b>${code}</b>` : ""; }

// ---- wake lock (belt + braces; Fully already keeps the screen on) ----
async function wake(){ try{ await navigator.wakeLock?.request("screen"); }catch{} }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") wake(); });

// ---- go live with an incoming stream ----
function goLive(stream){
  clearTimeout(retryT); live = true;
  const v = $("v"); v.srcObject = stream; $("live").classList.add("on"); $("home").style.display = "none";
  document.documentElement.requestFullscreen?.().catch(()=>{});
  // when the phone stops casting, fall back to the waiting screen and resume hunting
  stream.getVideoTracks()[0]?.addEventListener("ended", dropLive);
  stream.addEventListener?.("inactive", dropLive);
  // briefly show the top bar then fade it
  $("bar").style.opacity = 1; setTimeout(()=>{ $("bar").style.opacity = 0; }, 3500);
}
function dropLive(){
  if (!live) return; live = false;
  $("live").classList.remove("on"); $("home").style.display = ""; $("v").srcObject = null;
  setStatus("waiting for your handstand…"); hunt();
}

// ---- the auto-reconnect loop: keep reaching for the phone until it answers ----
function hunt(){
  if (!code || live || !peer || !peer.open) return;
  setStatus("waiting for your handstand…");
  try{
    const conn = peer.connect("cali-" + code, { reliable:false });
    if (!conn){ retryT = setTimeout(hunt, 3000); return; }
    pairedConn = conn;
    conn.on("open", () => conn.send("mirror-hello"));   // wakes the phone -> it calls back with the stream
    conn.on("error", () => {});
  }catch{}
  retryT = setTimeout(() => { if (!live) hunt(); }, 3000);  // phone offline -> try again shortly
}

function boot(){
  peer = new Peer();
  peer.on("open", () => {
    footer();
    if (code){ showPair(false); hunt(); } else { showPair(true); setStatus(""); }
  });
  peer.on("call", call => { call.answer(); call.on("stream", goLive); });   // phone -> our screen
  peer.on("error", e => { if (e.type === "peer-unavailable") return; /* phone not up yet: hunt retries */ });
  wake();
}

// ---- first-run pairing ----
function pair(){
  const c = $("code").value.trim().toUpperCase();
  if (c.length !== 4){ $("msg").textContent = "the code is 4 letters"; return; }
  code = c; localStorage.setItem(KEY, code); footer();
  $("msg").textContent = ""; showPair(false); setStatus("connecting…"); hunt();
}
$("go").onclick = pair;
$("code").addEventListener("keydown", e => { if (e.key === "Enter") pair(); });

// ---- re-pair: triple-tap the top-right corner to change the phone ----
let taps = 0, tapT = null;
$("repair").addEventListener("click", () => {
  taps++; clearTimeout(tapT); tapT = setTimeout(() => taps = 0, 800);
  if (taps >= 3){ taps = 0; localStorage.removeItem(KEY); code = null; clearTimeout(retryT);
    if (live) dropLive(); footer(); $("code").value = ""; showPair(true); setStatus(""); }
});

boot();
</script></body></html>
