<!doctype html>
<!-- ============================================================================
     CALIHOME — the handstand-board screen. Not a browser: a purpose-built Cali
     device face. Pairs ONCE to a phone running Cali Coach (⚙ > Mirror), saves the
     code, and auto-reconnects itself for good. The phone films + scores + casts;
     this shows it fullscreen. Runs locked in Fully Kiosk on the Tab A8 (SM-X205).
     Onyx/Bone/Amber/Gold — the Skill-Swirl palette.
     Crash-proof: any error/disconnect returns to the branded waiting screen and
     keeps hunting for the phone. A visible "pair a different phone" is always there.
============================================================================ -->
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CaliHome</title>
<style>
  :root{ --onyx:#1A1A1E; --bone:#ECE7DB; --amber:#F2B208; --gold:#C6A02C; --crimson:#D22F2A; --sub:#8b8778; }
  *{box-sizing:border-box;margin:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--onyx);color:var(--bone);
    font-family:"Helvetica Neue",Arial,system-ui,sans-serif;touch-action:none}
  #bg{position:fixed;inset:0;background:radial-gradient(120% 90% at 50% 40%, #23231b 0%, #1A1A1E 55%, #0e0e10 100%)}
  .ring{position:fixed;top:40%;left:50%;width:180px;height:180px;margin:-90px 0 0 -90px;border-radius:50%;
    border:1.5px solid var(--gold);opacity:0;animation:sonar 4.2s ease-out infinite}
  .ring:nth-child(2){animation-delay:1.4s} .ring:nth-child(3){animation-delay:2.8s}
  @keyframes sonar{0%{transform:scale(.5);opacity:.55}70%{opacity:.06}100%{transform:scale(3.4);opacity:0}}
  @media (prefers-reduced-motion:reduce){.ring{animation:none}}

  #home{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;padding:5vh 4vw}
  .mark{font-weight:900;letter-spacing:.14em;font-size:clamp(42px,8.5vw,100px);line-height:.92}
  .mark b{color:var(--amber)}
  .tag{color:var(--sub);letter-spacing:.42em;font-size:clamp(11px,1.9vw,15px);text-transform:uppercase;font-weight:700;margin-top:6px}
  .status{margin-top:6px;color:var(--bone);font-size:clamp(15px,2.4vw,20px);min-height:1.4em;font-weight:500}
  .status .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--amber);margin-right:9px;vertical-align:middle;animation:blink 1.3s ease-in-out infinite}
  @keyframes blink{50%{opacity:.25}}

  /* pairing block (hidden unless pairing) */
  #pair{display:none;flex-direction:column;align-items:center;gap:16px;margin-top:4px}
  #pair.show{display:flex}
  #pair p{color:var(--sub);max-width:460px;font-size:15px;line-height:1.5}
  #pair p b{color:var(--bone)}
  input{background:#121216;border:1.5px solid #34342c;color:var(--amber);border-radius:16px;padding:14px;
    font-size:38px;width:240px;text-align:center;letter-spacing:14px;text-transform:uppercase;font-weight:800;outline:none}
  input:focus{border-color:var(--amber)}
  .row{display:flex;gap:12px;align-items:center}
  button{background:var(--amber);color:#1a1205;border:0;border-radius:14px;padding:14px 30px;font-size:17px;font-weight:800;letter-spacing:.03em}
  button.ghost{background:transparent;color:var(--sub);border:1.5px solid #34342c}
  button:active{transform:translateY(1px)}
  .msg{color:var(--crimson);font-size:14px;min-height:1.1em}

  /* always-visible re-pair control on the waiting screen */
  #footer{position:fixed;bottom:20px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px}
  #paired{color:var(--sub);font-size:13px;letter-spacing:.18em;text-transform:uppercase}
  #paired b{color:var(--gold);letter-spacing:.28em}
  #repairbtn{background:transparent;border:1.5px solid #34342c;color:var(--sub);border-radius:20px;padding:9px 18px;font-size:13px;font-weight:700;letter-spacing:.04em}

  video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:none}
  #live.on video{display:block}
  #bar{position:fixed;top:0;left:0;right:0;height:46px;display:none;align-items:center;justify-content:space-between;
    padding:0 18px;background:linear-gradient(#000a,transparent);pointer-events:none;transition:opacity .5s;z-index:5}
  #live.on #bar{display:flex}
  #bar .b-mark{font-weight:900;letter-spacing:.14em;font-size:16px}
  #bar .b-mark b{color:var(--amber)}
  #bar .b-live{color:var(--crimson);font-weight:800;letter-spacing:.12em;font-size:13px}
  #bar .b-live i{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--crimson);margin-right:7px;animation:blink 1.1s infinite}
  /* a small always-tappable exit from live back to home (top-left), for when a stream hangs */
  #leave{position:fixed;top:0;left:0;width:90px;height:60px;z-index:8;display:none}
  #live.on #leave{display:block}
</style></head><body>
<div id="bg"></div>
<div class="ring"></div><div class="ring"></div><div class="ring"></div>

<div id="home">
  <div>
    <div class="mark">CALI<b>HOME</b></div>
    <div class="tag">Handstand Mirror</div>
  </div>
  <div class="status" id="status"><span class="dot"></span>starting…</div>

  <div id="pair">
    <p>On your phone open <b>Cali Coach</b> → ⚙ → <b>Mirror to a screen</b> → <b>Get mirror code</b>, then type it here.</p>
    <input id="code" maxlength="4" placeholder="CODE" autocapitalize="characters" autocomplete="off" inputmode="text">
    <div class="row">
      <button id="go">Pair</button>
      <button id="cancel" class="ghost" style="display:none">Cancel</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<div id="footer">
  <div id="paired"></div>
  <button id="repairbtn" style="display:none">Pair a different phone</button>
</div>

<div id="live">
  <video id="v" playsinline autoplay muted></video>
  <div id="bar"><span class="b-mark">CALI<b>HOME</b></span><span class="b-live"><i></i>LIVE</span></div>
  <div id="leave" title="back to home"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const KEY = "caliHomeCode";
let peer = null, code = localStorage.getItem(KEY), live = false, retryT = null, booting = true;

function setStatus(t, showDot=true){ $("status").innerHTML = (showDot?'<span class="dot"></span>':'') + t; }
function footer(){
  $("paired").innerHTML = code ? `paired · <b>${code}</b>` : "";
  $("repairbtn").style.display = (code && !$("pair").classList.contains("show")) ? "" : "none";
}

// ---------- screen states ----------
function toWaiting(){                    // saved code: branded idle + hunt + visible re-pair
  live = false; $("live").classList.remove("on"); $("home").style.display = "";
  $("pair").classList.remove("show"); $("status").style.display = "";
  setStatus("waiting for your handstand…"); footer(); hunt();
}
function toPair(preset){                 // show the code input (first run OR "pair a different phone")
  live = false; clearTimeout(retryT); $("live").classList.remove("on"); $("home").style.display = "";
  $("status").style.display = "none"; $("pair").classList.add("show");
  $("cancel").style.display = code ? "" : "none";     // cancel only makes sense if a code already exists
  if (preset !== undefined) $("code").value = preset;
  $("msg").textContent = ""; footer();
  try { $("code").focus(); } catch {}
}

// ---------- wake lock (Fully also keeps the screen on) ----------
async function wake(){ try{ await navigator.wakeLock?.request("screen"); }catch{} }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible"){ wake(); if (!live) hunt(); } });

// ---------- live stream ----------
function goLive(stream){
  try{
    clearTimeout(retryT); live = true;
    const v = $("v"); v.srcObject = stream;
    $("live").classList.add("on"); $("home").style.display = "none"; $("pair").classList.remove("show");
    v.play?.().catch(()=>{});
    try{ document.documentElement.requestFullscreen?.().catch(()=>{}); }catch{}
    const t = stream.getVideoTracks?.()[0];
    t && t.addEventListener("ended", dropLive);
    stream.addEventListener?.("inactive", dropLive);
    $("bar").style.opacity = 1; setTimeout(()=>{ $("bar").style.opacity = 0; }, 3500);
  }catch(e){ dropLive(); }
}
function dropLive(){ if (!code){ toPair(); return; } toWaiting(); }
// any video trouble -> fall back gracefully, never a black screen
["error","emptied","stalled","ended","abort"].forEach(ev => $("v").addEventListener(ev, () => { if (live) dropLive(); }));
$("leave").addEventListener("click", dropLive);

// ---------- the auto-reconnect hunt ----------
function ensurePeer(){
  if (peer && !peer.destroyed) return;
  try{
    peer = new Peer();
    peer.on("open", () => { booting = false; if (!live){ code ? toWaiting() : toPair(); } });
    peer.on("call", call => { try{ call.answer(); call.on("stream", goLive); }catch{} });
    peer.on("disconnected", () => { try{ peer.reconnect(); }catch{} });
    peer.on("error", e => { if (e.type === "unavailable-id"){ peer=null; ensurePeer(); } });  // peer-unavailable is normal (phone not up): ignore, hunt retries
    peer.on("close", () => { peer=null; if(!live){ ensurePeer(); } });
  }catch(e){ setTimeout(ensurePeer, 2000); }
}
function hunt(){
  if (live || !code) return;
  ensurePeer();
  if (!peer || !peer.open){ retryT = setTimeout(hunt, 2000); return; }
  try{
    const conn = peer.connect("cali-" + code, { reliable:false });
    if (conn){ conn.on("open", () => { try{ conn.send("mirror-hello"); }catch{} }); conn.on("error", ()=>{}); }
  }catch{}
  retryT = setTimeout(() => { if (!live) hunt(); }, 3000);   // phone offline -> keep trying the same code
}

// ---------- first-run / re-pair input ----------
function pair(){
  const c = ($("code").value || "").trim().toUpperCase();
  if (c.length !== 4){ $("msg").textContent = "the code is 4 letters"; return; }
  code = c; localStorage.setItem(KEY, code);
  toWaiting();
}
$("go").onclick = pair;
$("cancel").onclick = () => { toWaiting(); };
$("code").addEventListener("keydown", e => { if (e.key === "Enter") pair(); });
$("repairbtn").onclick = () => toPair("");   // visible "pair a different phone"

// ---------- never white-screen: any uncaught error returns to a safe state ----------
function softReset(){ try{ if (live){ live=false; $("live").classList.remove("on"); } code ? toWaiting() : toPair(); }catch{} }
window.addEventListener("error", softReset);
window.addEventListener("unhandledrejection", softReset);

// ---------- boot ----------
setStatus("starting…"); wake();
ensurePeer();
setTimeout(() => { if (booting){ code ? toWaiting() : toPair(); } }, 4000);   // fallback if the broker is slow
</script></body></html>
